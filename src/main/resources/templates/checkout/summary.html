<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Checkout summary')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('books')}"></div>

<main class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
    <div th:replace="~{fragments :: flash}"></div>
    <div class="mb-8">
        <p class="text-sm font-semibold uppercase tracking-[0.2em] text-bookwise-700">Checkout</p>
        <h1 class="mt-2 text-3xl font-bold">Review your selection</h1>
    </div>

    <div class="grid gap-8 lg:grid-cols-[1fr,320px]">
        <div class="space-y-4">
            <article th:each="book : ${preview.books}" class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
                <div class="flex gap-4">
                    <img th:src="@{'/covers/' + ${book.id}}" alt="Cover" class="h-24 w-20 rounded-2xl object-cover"/>
                    <div class="min-w-0">
                        <h2 class="text-lg font-semibold" th:text="${book.title}"></h2>
                        <p class="mt-1 text-sm text-slate-500" th:text="${#strings.listJoin(book.authors.![fullName], ', ')}"></p>
                        <p class="mt-2 text-sm font-semibold text-bookwise-700" th:text="${@moneyUtils.formatMinorUnits(book.priceAmount, book.currency)}"></p>
                    </div>
                </div>
            </article>
        </div>

        <aside class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <h2 class="text-xl font-bold">Order total</h2>
            <p class="mt-2 text-3xl font-bold text-bookwise-700" th:text="${@moneyUtils.formatMinorUnits(preview.totalAmount, preview.currency)}"></p>
            <p class="mt-2 text-sm text-slate-500">You will be redirected to the payment instructions page after checkout.</p>

            <form class="mt-6 space-y-4" th:action="@{/checkout}" th:object="${checkoutRequestForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div th:replace="~{fragments :: formErrors}"></div>
                <input type="hidden" th:each="book : ${preview.books}" name="bookIds" th:value="${book.id}"/>
                <button type="submit" class="w-full rounded-2xl bg-bookwise-700 px-4 py-3 font-semibold text-white hover:bg-bookwise-800">Confirm purchase</button>
            </form>
        </aside>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
