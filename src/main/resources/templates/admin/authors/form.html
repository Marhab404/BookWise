<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Author form')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('admin')}"></div>

<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div th:replace="~{fragments :: flash}"></div>
    <div class="flex flex-col gap-8 lg:flex-row">
        <div th:replace="~{fragments :: adminNav('authors')}"></div>
        <section class="flex-1 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <h1 class="text-3xl font-bold" th:text="${formMode == 'create' ? 'Create author' : 'Edit author'}"></h1>

            <form class="mt-8 space-y-5" th:action="${formMode == 'create'} ? @{/admin/authors/create} : @{/admin/authors/{id}/edit(id=${author.id})}" th:object="${authorForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div th:replace="~{fragments :: formErrors}"></div>

                <div>
                    <label class="mb-2 block text-sm font-medium">Full name</label>
                    <input th:field="*{fullName}" type="text" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium">Biography</label>
                    <textarea th:field="*{biography}" rows="6" class="w-full rounded-2xl border border-slate-300 px-4 py-3"></textarea>
                </div>

                <div class="flex gap-3">
                    <button type="submit" class="rounded-2xl bg-bookwise-700 px-5 py-3 font-semibold text-white hover:bg-bookwise-800">Save</button>
                    <a href="/admin/authors" class="rounded-2xl border border-slate-300 px-5 py-3 font-semibold text-slate-700">Cancel</a>
                </div>
            </form>
        </section>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
