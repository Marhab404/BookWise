<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Admin categories')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('admin')}"></div>

<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div th:replace="~{fragments :: flash}"></div>
    <div class="flex flex-col gap-8 lg:flex-row">
        <div th:replace="~{fragments :: adminNav('categories')}"></div>
        <section class="flex-1">
            <div class="mb-6 flex items-center justify-between">
                <div>
                    <p class="text-sm font-semibold uppercase tracking-[0.2em] text-bookwise-700">Categories</p>
                    <h1 class="mt-2 text-3xl font-bold">Manage categories</h1>
                </div>
                <a href="/admin/categories/create" class="rounded-full bg-bookwise-700 px-4 py-2 font-semibold text-white">Create category</a>
            </div>

            <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-500">
                    <tr>
                        <th class="px-6 py-4">Name</th>
                        <th class="px-6 py-4">Books</th>
                        <th class="px-6 py-4"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="category : ${categories}" class="border-t border-slate-100">
                        <td class="px-6 py-4 font-medium" th:text="${category.name}"></td>
                        <td class="px-6 py-4" th:text="${category.books.size()}"></td>
                        <td class="px-6 py-4">
                            <div class="flex flex-wrap gap-2">
                                <a th:href="@{'/admin/categories/' + ${category.id} + '/edit'}" class="font-semibold text-bookwise-700">Edit</a>
                                <form th:action="@{'/admin/categories/' + ${category.id} + '/delete'}" method="post" onsubmit="return confirm('Delete this category?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="font-semibold text-rose-700">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
