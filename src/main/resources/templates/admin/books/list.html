<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Admin books')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('admin')}"></div>

<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div th:replace="~{fragments :: flash}"></div>
    <div class="flex flex-col gap-8 lg:flex-row">
        <div th:replace="~{fragments :: adminNav('books')}"></div>
        <section class="flex-1">
            <div class="mb-6 flex items-center justify-between">
                <div>
                    <p class="text-sm font-semibold uppercase tracking-[0.2em] text-bookwise-700">Books</p>
                    <h1 class="mt-2 text-3xl font-bold">Manage books</h1>
                </div>
                <a href="/admin/books/create" class="rounded-full bg-bookwise-700 px-4 py-2 font-semibold text-white">Create book</a>
            </div>

            <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-500">
                    <tr>
                        <th class="px-6 py-4">Title</th>
                        <th class="px-6 py-4">Authors</th>
                        <th class="px-6 py-4">Price</th>
                        <th class="px-6 py-4">Published</th>
                        <th class="px-6 py-4"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="book : ${books}" class="border-t border-slate-100">
                        <td class="px-6 py-4 font-medium" th:text="${book.title}"></td>
                        <td class="px-6 py-4" th:text="${#strings.listJoin(book.authors.![fullName], ', ')}"></td>
                        <td class="px-6 py-4" th:text="${@moneyUtils.formatMinorUnits(book.priceAmount, book.currency)}"></td>
                        <td class="px-6 py-4" th:text="${book.published ? 'Yes' : 'No'}"></td>
                        <td class="px-6 py-4">
                            <div class="flex flex-wrap gap-2">
                                <a th:href="@{'/admin/books/' + ${book.id} + '/edit'}" class="font-semibold text-bookwise-700">Edit</a>
                                <form th:if="${book.published}" th:action="@{'/admin/books/' + ${book.id} + '/unpublish'}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="font-semibold text-amber-700">Unpublish</button>
                                </form>
                                <form th:if="${!book.published}" th:action="@{'/admin/books/' + ${book.id} + '/publish'}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="font-semibold text-emerald-700">Publish</button>
                                </form>
                                <form th:action="@{'/admin/books/' + ${book.id} + '/delete'}" method="post" onsubmit="return confirm('Delete this book? This cannot be undone.');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="font-semibold text-rose-700">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
