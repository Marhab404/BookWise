<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Book form')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('admin')}"></div>

<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div th:replace="~{fragments :: flash}"></div>
    <div class="flex flex-col gap-8 lg:flex-row">
        <div th:replace="~{fragments :: adminNav('books')}"></div>
        <section class="flex-1 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <h1 class="text-3xl font-bold" th:text="${formMode == 'create' ? 'Create book' : 'Edit book'}"></h1>

            <form class="mt-8 space-y-5" th:action="${formMode == 'create'} ? @{/admin/books/create} : @{/admin/books/{id}/edit(id=${book.id})}" th:object="${bookForm}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div th:replace="~{fragments :: formErrors}"></div>

                <div class="grid gap-5 md:grid-cols-2">
                    <div>
                        <label class="mb-2 block text-sm font-medium">Title</label>
                        <input th:field="*{title}" type="text" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium">Subtitle</label>
                        <input th:field="*{subtitle}" type="text" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium">ISBN</label>
                        <input th:field="*{isbn}" type="text" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium">Publication year</label>
                        <input th:field="*{publicationYear}" type="number" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium">Language</label>
                        <input th:field="*{language}" type="text" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium">Currency</label>
                        <input th:field="*{currency}" type="text" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium">Price amount</label>
                        <input th:field="*{priceAmount}" type="number" step="0.01" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                    <div class="flex items-end">
                        <label class="flex items-center gap-3 rounded-2xl border border-slate-300 px-4 py-3">
                            <input th:field="*{published}" type="checkbox" class="h-4 w-4"/>
                            <span class="text-sm font-medium">Published</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="mb-2 block text-sm font-medium">Description</label>
                    <textarea th:field="*{description}" rows="6" class="w-full rounded-2xl border border-slate-300 px-4 py-3"></textarea>
                </div>

                <div class="grid gap-5 md:grid-cols-2">
                    <div>
                        <label class="mb-2 block text-sm font-medium">Authors</label>
                        <select th:field="*{authorIds}" multiple class="w-full rounded-2xl border border-slate-300 px-4 py-3">
                            <option th:each="author : ${allAuthors}" th:value="${author.id}" th:text="${author.fullName}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium">Categories</label>
                        <select th:field="*{categoryIds}" multiple class="w-full rounded-2xl border border-slate-300 px-4 py-3">
                            <option th:each="category : ${allCategories}" th:value="${category.id}" th:text="${category.name}"></option>
                        </select>
                    </div>
                </div>

                <div class="grid gap-5 md:grid-cols-2">
                    <div>
                        <label class="mb-2 block text-sm font-medium">Cover image</label>
                        <input th:field="*{coverImage}" type="file" accept="image/*" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium">Digital files</label>
                        <input name="digitalFiles" type="file" multiple accept=".pdf,.epub" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                    </div>
                </div>

                <div th:if="${formMode == 'edit'}" class="rounded-3xl border border-slate-200 bg-slate-50 p-5">
                    <div class="flex items-center justify-between gap-4">
                        <div>
                            <h2 class="text-lg font-semibold">Digital files</h2>
                            <p class="text-sm text-slate-500">Delete a file from protected storage and the book record.</p>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(bookFiles)}" class="mt-4 rounded-2xl border border-dashed border-slate-300 bg-white px-4 py-3 text-sm text-slate-500">
                        No digital files uploaded yet.
                    </div>
                    <div th:if="${!#lists.isEmpty(bookFiles)}" class="mt-4 space-y-3">
                        <div th:each="file : ${bookFiles}" class="flex flex-col gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 sm:flex-row sm:items-center sm:justify-between">
                            <div>
                                <p class="font-medium text-slate-900" th:text="${file.fileName}"></p>
                                <p class="text-sm text-slate-500" th:text="${file.fileType + ' | ' + file.fileSize + ' bytes'}"></p>
                            </div>
                            <form th:action="@{/admin/books/{bookId}/files/{fileId}/delete(bookId=${book.id}, fileId=${file.id})}" method="post" onsubmit="return confirm('Delete this digital file?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="font-semibold text-rose-700">
                                    Delete file
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button type="submit" class="rounded-2xl bg-bookwise-700 px-5 py-3 font-semibold text-white hover:bg-bookwise-800">Save</button>
                    <a href="/admin/books" class="rounded-2xl border border-slate-300 px-5 py-3 font-semibold text-slate-700">Cancel</a>
                </div>
            </form>
        </section>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
