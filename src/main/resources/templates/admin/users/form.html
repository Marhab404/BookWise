<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('User form')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('admin')}"></div>

<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div th:replace="~{fragments :: flash}"></div>
    <div class="flex flex-col gap-8 lg:flex-row">
        <div th:replace="~{fragments :: adminNav('users')}"></div>
        <section class="flex-1 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <h1 class="text-3xl font-bold" th:text="${formMode == 'create' ? 'Create user' : 'Edit user'}"></h1>

            <form class="mt-8 space-y-5" th:action="${formMode == 'create'} ? @{/admin/users/create} : @{/admin/users/{id}/edit(id=${user.id})}" th:object="${userForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div th:replace="~{fragments :: formErrors}"></div>

                <div>
                    <label class="mb-2 block text-sm font-medium">Full name</label>
                    <input th:field="*{fullName}" type="text" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium">Email</label>
                    <input th:field="*{email}" type="email" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium">Role</label>
                    <select th:field="*{role}" class="w-full rounded-2xl border border-slate-300 px-4 py-3">
                        <option value="READER">Reader</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium" th:text="${formMode == 'create'} ? 'Password' : 'Password (leave blank to keep current)'"></label>
                    <input th:field="*{password}" type="password" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium">Confirm password</label>
                    <input th:field="*{confirmPassword}" type="password" class="w-full rounded-2xl border border-slate-300 px-4 py-3"/>
                </div>

                <div class="flex gap-3">
                    <button type="submit" class="rounded-2xl bg-bookwise-700 px-5 py-3 font-semibold text-white hover:bg-bookwise-800">Save</button>
                    <a href="/admin/users" class="rounded-2xl border border-slate-300 px-5 py-3 font-semibold text-slate-700">Cancel</a>
                </div>
            </form>
        </section>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
