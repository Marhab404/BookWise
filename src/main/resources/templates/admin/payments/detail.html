<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Payment review')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('admin')}"></div>

<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div th:replace="~{fragments :: flash}"></div>
    <div class="flex flex-col gap-8 lg:flex-row">
        <div th:replace="~{fragments :: adminNav('payments')}"></div>
        <section class="flex-1 space-y-6">
            <article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <p class="text-sm font-semibold uppercase tracking-[0.2em] text-bookwise-700">Order #<span th:text="${payment.order.id}"></span></p>
                <h1 class="mt-2 text-3xl font-bold">Review payment proof</h1>
                <p class="mt-2 text-sm text-slate-500">Status: <span th:text="${payment.status}"></span></p>
            </article>

            <article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h2 class="text-xl font-bold">Customer</h2>
                <p class="mt-3">Name: <span class="font-medium" th:text="${payment.order.user.fullName}"></span></p>
                <p>Email: <span class="font-medium" th:text="${payment.order.user.email}"></span></p>
            </article>

            <article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h2 class="text-xl font-bold">Purchased books</h2>
                <div class="mt-4 space-y-3">
                    <p th:each="item : ${payment.order.items}" class="border-b border-slate-100 pb-3 last:border-0">
                        <span class="font-medium" th:text="${item.book.title}"></span>
                    </p>
                </div>
            </article>

            <article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h2 class="text-xl font-bold">Payment proof</h2>
                <p class="mt-3 text-sm text-slate-600">Reference: <span class="font-medium" th:text="${payment.transferReference}"></span></p>
                <a th:href="@{'/admin/payments/' + ${payment.id} + '/proof'}" class="mt-4 inline-flex rounded-full bg-bookwise-700 px-4 py-2 font-semibold text-white">View proof</a>
            </article>

            <article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h2 class="text-xl font-bold">Review action</h2>
                <form class="mt-5 space-y-4" th:object="${paymentReviewForm}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div>
                        <label class="mb-2 block text-sm font-medium">Admin note</label>
                        <textarea th:field="*{adminReviewNote}" rows="4" class="w-full rounded-2xl border border-slate-300 px-4 py-3"></textarea>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <button th:formaction="@{'/admin/payments/' + ${payment.id} + '/approve'}" class="rounded-2xl bg-emerald-700 px-5 py-3 font-semibold text-white">Approve</button>
                        <button th:formaction="@{'/admin/payments/' + ${payment.id} + '/reject'}" class="rounded-2xl bg-rose-700 px-5 py-3 font-semibold text-white">Reject</button>
                    </div>
                </form>
            </article>
        </section>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
