<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Sign in')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('')}"></div>

<main class="mx-auto max-w-md px-4 py-14 sm:px-6 lg:px-8">
    <div class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
        <div th:replace="~{fragments :: flash}"></div>
        <h1 class="text-3xl font-bold">Sign in</h1>
        <p class="mt-2 text-sm text-slate-600">Access your orders and purchased books.</p>

        <form class="mt-8 space-y-5" th:action="@{/auth/login}" th:object="${loginForm}" method="post">
            <div th:replace="~{fragments :: formErrors}"></div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{next}"/>

            <div>
                <label class="mb-2 block text-sm font-medium">Email</label>
                <input th:field="*{email}" type="email" class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none focus:border-bookwise-600"/>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium">Password</label>
                <input th:field="*{password}" type="password" class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none focus:border-bookwise-600"/>
            </div>

            <button type="submit" class="w-full rounded-2xl bg-bookwise-700 px-4 py-3 font-semibold text-white hover:bg-bookwise-800">Sign in</button>
        </form>

        <p class="mt-6 text-sm text-slate-600">
            No account yet?
            <a th:href="@{/auth/register(next=${loginForm.next})}" class="font-semibold text-bookwise-700 hover:text-bookwise-800">Create one</a>
        </p>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
