<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Book details')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('books')}"></div>

<main class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="grid gap-10 lg:grid-cols-[320px,1fr]">
        <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
            <img th:src="@{'/covers/' + ${book.id}}" alt="Cover" class="h-full w-full object-cover"/>
        </div>
        <div class="space-y-6">
            <div th:replace="~{fragments :: flash}"></div>
            <div>
                <p class="text-sm font-semibold uppercase tracking-[0.2em] text-bookwise-700">Book details</p>
                <h1 class="mt-2 text-4xl font-bold text-slate-900" th:text="${book.title}"></h1>
                <p class="mt-2 text-lg text-slate-600" th:text="${book.subtitle}"></p>
            </div>
            <p class="max-w-3xl text-base leading-7 text-slate-700" th:text="${book.description}"></p>
            <div class="grid gap-4 sm:grid-cols-2">
                <div>
                    <p class="text-sm text-slate-500">Authors</p>
                    <p class="font-medium" th:text="${#strings.listJoin(book.authors.![fullName], ', ')}"></p>
                </div>
                <div>
                    <p class="text-sm text-slate-500">Categories</p>
                    <p class="font-medium" th:text="${#strings.listJoin(book.categories.![name], ', ')}"></p>
                </div>
                <div>
                    <p class="text-sm text-slate-500">Language</p>
                    <p class="font-medium" th:text="${book.language}"></p>
                </div>
                <div>
                    <p class="text-sm text-slate-500">Publication year</p>
                    <p class="font-medium" th:text="${book.publicationYear}"></p>
                </div>
            </div>
            <div class="flex items-center gap-4 rounded-3xl border border-slate-200 bg-white p-6">
                <div>
                    <p class="text-sm text-slate-500">Price</p>
                    <p class="text-2xl font-bold text-bookwise-700" th:text="${@moneyUtils.formatMinorUnits(book.priceAmount, book.currency)}"></p>
                </div>
                <a th:href="@{/checkout(bookIds=${book.id})}" class="rounded-full bg-bookwise-700 px-6 py-3 font-semibold text-white hover:bg-bookwise-800">Buy now</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
