<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Catalog')}"></head>
<body class="bg-slate-50 text-slate-900">
<div th:replace="~{fragments :: navbar('books')}"></div>

<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div th:replace="~{fragments :: flash}"></div>
    <div class="mb-8">
        <p class="text-sm font-semibold uppercase tracking-[0.2em] text-bookwise-700">Catalog</p>
        <h1 class="mt-2 text-3xl font-bold">Published books</h1>
    </div>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <article th:each="book : ${books}" class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm transition hover:shadow-lg">
            <img th:src="@{'/covers/' + ${book.id}}" alt="Cover" class="h-72 w-full object-cover"/>
            <div class="p-5">
                <p class="text-sm text-slate-500" th:text="${#strings.listJoin(book.authors.![fullName], ', ')}"></p>
                <h2 class="mt-2 text-xl font-semibold text-slate-900" th:text="${book.title}"></h2>
                <p class="mt-2 line-clamp-3 text-sm text-slate-600" th:text="${book.description}"></p>
                <div class="mt-4 flex flex-wrap gap-2">
                    <span th:each="category : ${book.categories}" class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600" th:text="${category.name}"></span>
                </div>
                <div class="mt-5 flex items-center justify-between">
                    <span class="font-semibold text-bookwise-700" th:text="${@moneyUtils.formatMinorUnits(book.priceAmount, book.currency)}"></span>
                    <a th:href="@{'/books/' + ${book.id}}" class="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:border-bookwise-600 hover:text-bookwise-700">View details</a>
                </div>
            </div>
        </article>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
