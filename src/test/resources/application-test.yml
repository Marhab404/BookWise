spring:
  datasource:
    url: jdbc:h2:mem:bookwise;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  thymeleaf:
    cache: false

app:
  seed-demo: false
  security:
    cookie-secure: false
  jwt:
    secret: test-jwt-secret-test-jwt-secret-test-jwt-secret
    expiration-minutes: 480
    cookie-name: BOOKWISE_JWT
  storage:
    root: ./target/test-storage
    max-payment-proof-size-bytes: 10485760
  bank-transfer:
    bank-name: Test Bank
    account-holder-name: Test Holder
    iban: TESTIBAN
    reference-instruction: Test reference instruction
